<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution Club d'Échecs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Google Sans', sans-serif; background-color: #f8f9fa; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="mb-10 text-center">
        <h1 class="text-3xl font-bold text-gray-800">Suivi des Joueurs ♟️</h1>
        <p class="text-gray-500 mt-2">Évolution en temps réel du club</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto">
        
        <div class="card p-6 flex items-center justify-between border border-gray-100">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-2xl">👤</div>
                <div>
                    <h3 class="font-bold text-lg">Le_Maitre226</h3>
                    <p class="text-sm text-gray-400">@le_maitre226</p>
                </div>
            </div>
            <div class="text-right">
                <div class="text-2xl font-bold text-blue-600">1850 Elo</div>
                <div class="text-sm font-medium text-green-500">+42 ce mois</div>
            </div>
        </div>

        <div class="card p-6 flex items-center justify-between border border-gray-100">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center text-2xl">👑</div>
                <div>
                    <h3 class="font-bold text-lg">Red_Tetrix</h3>
                    <p class="text-sm text-gray-400">@red_tetrix</p>
                </div>
            </div>
            <div class="text-right">
                <div class="text-2xl font-bold text-blue-600">2202 Elo</div>
                <div class="text-sm font-medium text-green-500">+220 Progression</div>
            </div>
        </div>

    </div>

    <div class="max-w-6xl mx-auto mt-12 p-8 bg-blue-600 rounded-[32px] text-white">
        <h2 class="text-xl font-bold mb-4">Prochaine remise des prix 🏆</h2>
        <p class="opacity-90">Dans 11 jours, le joueur avec la meilleure progression recevra 5000 FCFA.</p>
    </div>

</body>
</html>
